<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Sign Up</title>
  <link rel="shortcut icon" href="image/logo.png" type="image/x-icon">
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Syne:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="bg-layer"></div>
  <div class="grid-bg"></div>

  <div class="wrapper">
    <div class="card" id="card">

      <div class="brand" id="lm">
        <img src="image/logo.png" alt="ORVIX" class="logo-img">
        <span class="brand-name">Astrix UMS</span>
      </div>

      <p class="brand-tag" id="tn">
        <span class="t-s">User</span>
        <span class="t-c">Management</span>
        <span class="t-a">System</span>
      </p>

      <div class="tab-row" id="tt">
        <button class="tab-btn active" id="tab-login">Login</button>
        <button class="tab-btn" id="tab-signup">Sign Up</button>
      </div>

      <form class="form-panel active" id="panel-login" autocomplete="off" onsubmit="return false;">

        <div class="field-group">
          <label for="login-email">Email</label>
          <div class="inp-wrap">
            <svg class="inp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <path d="m2 7 10 7 10-7" />
            </svg>
            <input type="email" id="login-email" name="username" autocomplete="off" placeholder="Enter your email"
              required>
          </div>
        </div>

        <div class="field-group">
          <label for="lpass">Password</label>
          <div class="inp-wrap">
            <svg class="inp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input type="password" id="lpass" name="password" autocomplete="new-password"
              placeholder="Enter your password" required>
            <button class="eye-btn" type="button" id="eye-c"></button>
          </div>
        </div>

        <div class="row-flex" id="fp">
          <a href="#" class="link-text">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-primary" id="login-btn">LOGIN</button>

        <p class="switch-text">
          Don't have an account?
          <a href="#" class="link-text" id="go-signup">Sign up</a>
        </p>

      </form>

      <form class="form-panel" id="panel-signup" autocomplete="off" onsubmit="return false;">

        <div class="field-group">
          <label for="signup-name">Full Name</label>
          <div class="inp-wrap">
            <!-- User/Name SVG Icon -->
            <svg class="inp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <input type="text" id="signup-name" name="name" autocomplete="name" placeholder="Enter your full name"
              required>
          </div>
        </div>


        <div class="field-group">

          <label for="signup-email">Email</label>
          <div class="inp-wrap">
            <svg class="inp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <path d="m2 7 10 7 10-7" />
            </svg>
            <input type="email" id="signup-email" name="email" autocomplete="off" placeholder="Enter your email"
              required>
          </div>
        </div>

        <div class="field-group">
          <label for="spass">Password</label>
          <div class="inp-wrap">
            <svg class="inp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input type="password" id="spass" name="new-password" autocomplete="new-password"
              placeholder="Create password" required>
            <button class="eye-btn" type="button" id="eye-cs"></button>
          </div>
        </div>
     
        <div class="other">

        

        <div class="field-group">
          <label for="sage">Age</label>
          <div class="inp-wrap">
            <svg class="inp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>

            <input type="number" id="sage" name="age" min="1" max="120" placeholder="Enter your age" required>
          </div>
        </div>

        <div class="field-group">
          <label for="city">City</label>

          <div class="inp-wrap">
            <svg class="inp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M12 21s7-4.35 7-11a7 7 0 1 0-14 0c0 6.65 7 11 7 11z" />
              <circle cx="12" cy="10" r="2.5" />
            </svg>

            <input type="text" id="city" name="city" placeholder="Enter your city" required>
          </div>
        </div>
     </div>


        <div class="field-group">
  <label for="profession">Profession</label>

  <div class="inp-wrap">
    <svg class="inp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M4 20h16"/>
      <rect x="7" y="8" width="10" height="8" rx="1"/>
      <path d="M9 8V6a3 3 0 0 1 6 0v2"/>
    </svg>

    <select id="profession" name="profession" required>
      <option value="" selected disabled>Select Profession</option>
      <option value="student">Student</option>
      <option value="developer">Developer</option>
      <option value="designer">Designer</option>
      <option value="teacher">Teacher</option>
      <option value="engineer">Engineer</option>
      <option value="doctor">Doctor</option>
      <option value="business">Business Owner</option>
      <option value="freelancer">Freelancer</option>
      <option value="content_creator">Content Creator</option>
      <option value="other">Other</option>
    </select>
  </div>
</div>


        <button type="submit" class="btn-primary" id="signup-btn">SIGN UP</button>

        <p class="switch-text">
          Already have an account?
          <a href="#" class="link-text" id="go-login">Login</a>
        </p>

      </form>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script type="module" src="script.js" defer></script>

</body>

</html>
